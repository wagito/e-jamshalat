=date.getDate(); mounth=date.getMonth(); year=date.getFullYear(); tname=['Imsak','Fajar','Duha','Dzuhur','Ashar','Maghrib','Isya']; hari=['Ahad','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu']; bulan=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des']; datef=hari[day]+'<br>'+date1+'&nbsp'+bulan[mounth]+'&nbsp'+year; document.getElementById('date').innerHTML=datef; html='<table style=\'width=100%;border:0px solid red;\'><tr style=\'border:0px solid red;font-size:1.5cqw;font-weight:bold;\'>'; for(i in tname)html+='<td width=10% background='+cellbg[i]+'>'+tname[i]+'<br>'+times[tname[i].toLowerCase()]+'</td>'; html+='</table>'; document.getElementById('jadual').innerHTML=html; modal=document.getElementById('modaltimer'); jamanalog=document.getElementById('jamanalog'); ctx=jamanalog.getContext('2d'); radius=jamanalog.height/2; ctx.translate(radius,radius); radius=radius*0.94; setInterval(drawClock,1000); } function plus(t,p){ at=t.split(':'); minute=parseInt(at[1])+parseInt(p); hour=parseInt(at[0]); if(minute>59) { minute-=60; hour+=1; } if(minute<0) { minute+=60; hour-=1; } if(minute<10)minute='0'+minute; if(hour<10)hour='0'+hour; return hour+':'+minute; } function fmt2(i){ if(i<10){i='0'+i};return i; } function minutemin(t1,t2) { at1=t1.split(':'); min1=Number(at1[0])*60+Number(at1[1]); at2=t2.split(':'); min2=Number(at2[0])*60+Number(at2[1]); return min2-min1; } function waktushalat(t) { shalat=false; if(t==times['fajar'])return iqm[0]; else if(t==times['dzuhur'])return(day==5)?100:iqm[1];else if(t==times['ashar'])return iqm[2]; else if(t==times['maghrib'])return iqm[3]; else if(t==times['isya'])return iqm[4]; else if(t=='00:10'||t=='01:10')location.reload();else return 0; } function beep(t){ audio=new Audio('beep.mp3'); audio_long=new Audio('beep-long.mp3'); if(t>0)audio.play(); else audio_long.play() } function tick(){ audio=new Audio('tick01.mp3'); audio.play(); } function timer(ts){ timeLimitInMinutes=ts; timeLimitInSeconds=timeLimitInMinutes*60; timerElement=document.getElementById('timer'); function startTimer(){ timeLimitInSeconds--; minutes=Math.floor(timeLimitInSeconds/60); seconds=timeLimitInSeconds%60; if(timeLimitInSeconds<0){ timerElement.textContent='00:00'; clearInterval(timerInterval); modal.style.display='none'; return; } if((seconds>50)&&(minutes==ts-1)){beep(seconds);} if((seconds<10)&&(minutes==0)){beep(seconds);}               timerElement.textContent=fmt2(minutes)+':'+fmt2(seconds); } timerInterval=setInterval(startTimer,1000); modal.style.display='block'; } function drawClock(){ drawFace(ctx,radius); drawNumbers(ctx,radius); drawTime(ctx,radius); } function drawFace(ctx,radius){ const grad=ctx.createRadialGradient(0,0,radius*0.95,0,0,radius*1.05); grad.addColorStop(0,'#333'); grad.addColorStop(0.5,'white'); grad.addColorStop(1,'#333'); ctx.beginPath(); ctx.arc(0,0,radius,0,2*Math.PI); ctx.fillStyle='white'; ctx.fill(); ctx.strokeStyle=grad; ctx.lineWidth=radius*0.1; ctx.stroke(); ctx.beginPath(); ctx.arc(0,0,radius*0.1,0,2*Math.PI); ctx.fillStyle='#333'; ctx.fill(); } function drawNumbers(ctx,radius){ ctx.font=radius*0.15+'px arial'; ctx.textBaseline='middle'; ctx.textAlign='center'; for(let num=1;num<13;num++){ let ang=num*Math.PI/6; ctx.rotate(ang); ctx.translate(0,-radius*0.85); ctx.rotate(-ang); ctx.fillText(num.toString(),0,0); ctx.rotate(ang); ctx.translate(0,radius*0.85); ctx.rotate(-ang); } } function drawTime(ctx,radius){ const now=new Date(); hour=now.getHours(); minute=now.getMinutes(); second=now.getSeconds(); if(second==0){tick();} if(second==0) { iimage++; if(iimage==nimage)iimage=0; document.getElementById('foto').src=image[iimage]; } document.getElementById('clock').innerHTML=fmt2(hour)+':'+fmt2(minute)+':'+fmt2(second); if(second==0) { ts=waktushalat(fmt2(hour)+':'+fmt2(minute)); if(ts==100) { document.getElementById('modaltext').textContent='ADZAN JUMAT'; timer(10/60); } else if(ts>1) { document.getElementById('modaltext').textContent='IQAMAH'; timer(ts);} } hour=hour%12; hour=(hour*Math.PI/6)+(minute*Math.PI/(6*60))+(second*Math.PI/(360*60)); drawHand(ctx,hour,radius*0.5,radius*0.07); minute=(minute*Math.PI/30)+(second*Math.PI/(30*60)); drawHand(ctx,minute,radius*0.8,radius*0.07); second=(second*Math.PI/30); drawHand(ctx,second,radius*0.9,radius*0.02); } function drawHand(ctx,pos,length,width){ ctx.beginPath(); ctx.lineWidth=width; ctx.lineCap='round'; ctx.moveTo(0,0); ctx.rotate(pos); ctx.lineTo(0,-length); ctx.stroke(); ctx.rotate(-pos); } </script>
