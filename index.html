<!DOCTYPE html>
<html lang='id'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>e-JamShalat</title>
<style>
  .neontext{
    font-family:titling;
    font-size:9cqh;
    color:#fff;
    text-align:center;
    position:relative;
    text-shadow:0 0 10px #00fff9,0 0 20px #00fff9,0 0 30px #00fff9,0 0 40px #00fff9,0 0 50px #00fff9,0 0 60px #00fff9,0 0 70px #00fff9;
  }
  .modal{
    display:none; /* Hidden by default */
    position:fixed; /* Stay in place */
    z-index:1; /* Sit on top */
    padding-top:90px; /* Location of the box */
    left:0;
    top:0;
    width:100%; /* Full width */
    height:100%; /* Full height */
    overflow:auto; /* Enable scroll if needed */
//    background-color:rgb(0,0,0); /* Fallback color */
    background-color:rgba(0,0,0,0.4); /* Black w/ opacity */

  /* Modal Content */
  .modalcontent {
    background-color: #fefefe;
    margin: auto;
    padding: 20px; /* Ditambah sedikit agar tulisan tidak terlalu mepet */
    //border: 1px solid #888;
    width: 60%;
  
    /* SOLUSI 1: Ubah height menjadi min-height atau max-height */
    max-height: 70%;       /* Batas maksimal tinggi modal */
  
    /* SOLUSI 2: Gunakan font-size yang lebih aman/standar */

    /* atau jika tetap mau cqw, batasi dengan fungsi clamp: clamp(14px, 2.5cqw, 24px) */

    border-radius: 40px;
    color: blue;
    text-align: center;
  
    /* Tambahan: Menggunakan Flexbox agar tulisan rapi di tengah */

    flex-direction: column;
    justify-content: center; 
    align-items: center;
    overflow: hidden; //sembunyikan scroll bar
  }
  body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    overflow-y:hidden;
    overflow-x:hidden;
    font-family:verdana;
    background-size:cover;
    width:100vw;
    height:100vh;
  }
  table{
    width:95%;
    height:95%;
    background-color:transparent;
    border-collapse:separate;     /* Mengizinkan pemisahan antar sel */
    border-spacing:5px;
    border-radius:20px;
    border:1px solid white;
  }
  td{
    vertical-align:middle; 
    text-align:center;
    border-radius:20px;
    //border:1px solid blue;
  }
  tdjam{
    display:flex;
    justify-content:center; /* Menengah secara horizontal */
    align-items:center;     /* Menengah secara vertikal */
    height:100%;            /* Mengisi seluruh tinggi cell */
    padding:0px;
  }
  .canvjam{
    width: 70%;       /* Jam akan berukuran 70% dari lebar TD */
    height: auto;     /* Tinggi otomatis mengikuti proporsi agar tetap bulat sempurna */
    aspect-ratio: 1;  /* Memaksa rasio kanvas tetap 1:1 (kotak/lingkaran sempurna) */
    background-color: #ffffff;
    border-radius: 50%;
  }
  td table{
    width: 100%;
    height: 100%;
    border-collapse: separate;     /* Mengizinkan pemisahan antar sel */
    border-spacing: 5px;
    //border:1px solid red;
  }
</style>
</head>
<body>

<table>
  <tr height=15%>
    <td colspan=2>
      <table>
        <tr>
          <td width=25%><img style='max-height:14cqh' src='files/0/logo.png'></td>
          <th><font style='font-size:3cqw' id=nama></font><br><font style='font-size:1.5cqw' id=alamat></font></th>
        </tr>
      </table>
    </td>
  </tr>
  <tr height=70%>
    <td width=25%>
      <table>
        <tr height=20%><td id=celjam><div class=neontext id=clock></div></td>
        <tr height=65%><td class=tdjam><canvas id=jamanalog width=500 height=500 class=canvjam onclick=timer(1)></canvas></td>
        <tr><th style='font-size:1.7cqw' id=date></th>
      </table>
    </td>
    <td><img style='max-height:56cqh;border-radius:20px;max-width:56cqw' id=foto src='files/0/image0.jpg'></td>
  </tr>
  <tr>
    <td colspan=2>
      <table>
        <tr><td id=jadual></td>
      </table>
    </td>
  </tr>
</table>

<div id=modaltimer class=modal>
  <div class=modalcontent>
     <h1><span id=modaltext></span><br><span id=timer></span></h1>
  </div>
</div>

</body>
</html>
<script src='PrayTimesModi2026.js'></script>
<script>
//mengambil variabel external mirip $_GET
qs = window.location.search;   //query String
up = new URLSearchParams(qs);  //url Parameter
m = up.get('m');               //nama variabel external m (hmtl) disimpan sebai m (javascript)
//console.log(m);

fetch('https:\/\/script.google.com/macros/s/AKfycbwVyKgK34Bf2cK7euDcCysqSL9NBEQpYth3VoytJyjG3UVnQ5e7ujE8PshJU9A5JLxh/exec?m='+m)
  .then(response=>response.json())
  .then(datajs=>{     //jason 2D
     data=datajs[0];   //ambil baris 0 sebagai larik 1D
     main();
     //console.log(datajs);  //tampilkan json 2D
     //console.log(datajs[0]); //tampilkan json baris 0
   })
   .catch(error=>{
     document.getElementById('nama').innerHTML='<font color=red>Data tidak ditemukan</font>';
     //console.error("Error:",error);
   });



function main()
{
  //parameter-parameter
  nama=data[2];
  alamat= data[3];
  kota=data[4];
  latitude=data[5];
  longitude=data[6];
  timeZone=data[7];
  method=data[8];
  iqm=data[10].split(";").map(Number);
  mnt=data[11].split(";").map(Number);
  iht=2; //ihtiyati

  time = Date.now();
  acak=Math.floor(Math.random() * 7);
  //atur background
  url='files/0/background'+acak+'.jpg?t='+time;
  document.body.style.backgroundImage=`url('${url}')`;
  //atur tulisan
  document.getElementById('nama').innerHTML=nama;
  document.getElementById('alamat').innerHTML=alamat+',&nbsp'+kota;

  //atur image dan cell-bg
  nimage=4; //jumlah image 4 karena mulai dari 0
  iimage=0;
  image=[];
  cellbg=[];
  for(i=0;i<nimage;i++)image[i]='files/0/image'+i+'.jpg';
  for(i=0;i<=6;i++)cellbg[i]='files/0/cell-bg'+(i+acak)+'.jpg';

  //skrip jadual shalat
  date=new Date(); // today
  prayTimes.setMethod('Muhammadiyah');
  pt=prayTimes.getTimes(date, [latitude, longitude], timeZone);  //jogja

  times={
    imsak:plus(pt['imsak'],iht+mnt[0]),
    fajar:plus(pt['fajr'],iht+mnt[0]),
    terbit:pt['sunrise'],
    duha:plus(pt['sunrise'],24+iht+mnt[1]),
    dzuhur:plus(pt['dhuhr'],iht+mnt[2]),
    ashar:plus(pt['asr'],iht+mnt[3]),
    terbenam:pt['sunset'],
    maghrib:plus(pt['maghrib'],iht+mnt[4]),
    isya:plus(pt['isha'],iht+mnt[5])
  };

  day=date.getDay();
  date1=date.getDate();
  mounth=date.getMonth();
  year=date.getFullYear();
  tname=['Imsak','Fajar','Duha','Dzuhur','Ashar','Maghrib','Isya'];
  hari=['Ahad','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  bulan=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];

  datef=hari[day]+'<br>'+date1+'&nbsp'+bulan[mounth]+'&nbsp'+year;
  document.getElementById('date').innerHTML=datef;

  html='<table style=\'width=100%;border:0px solid red;\'><tr style=\'border:0px solid red;font-size:1.5cqw;font-weight:bold;\'>';
  for(i in tname)html+='<td width=10% background='+cellbg[i]+'>'+tname[i]+'<br>'+times[tname[i].toLowerCase()]+'</td>';
  html+='</table>';
  document.getElementById('jadual').innerHTML=html;

  // Get the modal
  modal=document.getElementById('modaltimer');

  //skrip jam analog
  jamanalog=document.getElementById('jamanalog');
  ctx=jamanalog.getContext('2d');
  radius=jamanalog.height/2;
  ctx.translate(radius,radius);
  radius=radius*0.94;
  setInterval(drawClock,1000);
}

function plus(t,p) //menambahkan menit pada string jam
{
  at=t.split(':');
  minute=parseInt(at[1])+parseInt(p);   //menjadikan string jadi number dengan cara memberi tanda +
  hour=parseInt(at[0]);
  if(minute>59)
  {
    minute-=60;
    hour+=1;
  }
  if(minute<0)
  {
    minute+=60;
    hour-=1;
  }
  if(minute<10)minute='0'+minute;
  if(hour<10)hour='0'+hour;
  return hour+':'+minute;
}

function fmt2(i){
  if(i<10){i='0'+i};  // add zero in front of numbers < 10
  return i;
}

function minutemin(t1,t2)
{
  at1=t1.split(':');
  min1=Number(at1[0])*60+Number(at1[1]);
  at2=t2.split(':');
  min2=Number(at2[0])*60+Number(at2[1]);
  return min2-min1;
}
function waktushalat(t)
{
  shalat=false;
  if(t==times['fajar'])return iqm[0];
  else if(t==times['dzuhur'])return(day==5)?100:iqm[1]; //kalau jumat 100, hari biasa iqm[1]
  else if(t==times['ashar'])return iqm[2];
  else if(t==times['maghrib'])return iqm[3];
  else if(t==times['isya'])return iqm[4];
  //else if(t=='09:05')return 2; //klik jam utk tampil timer, ini hanya utk mencoba munculnya timer
  //else if(minutemin(t,'14:51')<2)return 2  //mencoba mengubah, apabila saat waktu sudah terlewat, belumbisa
  else if(t=='00:10'||t=='01:10')location.reload();  //tiap jam 00:10 atau 01:10 malam reload page menyesuakan waktu
  else return 0;
}
function beep(t){
  audio=new Audio('beep.mp3');
  audio_long=new Audio('beep-long.mp3');
  if(t>0) audio.play();
  else audio_long.play()
}
function tick(){
  audio=new Audio('tick01.mp3');
  audio.play();
}

function timer(ts){
  timeLimitInMinutes=ts;
  timeLimitInSeconds=timeLimitInMinutes*60;
  timerElement=document.getElementById('timer');
  function startTimer(){
    timeLimitInSeconds--;
    minutes=Math.floor(timeLimitInSeconds/60);
    seconds=timeLimitInSeconds%60;

    if (timeLimitInSeconds<0){
      timerElement.textContent='00:00';
      clearInterval(timerInterval);
      modal.style.display='none';
      return;
    }

    if((seconds>50)&&(minutes==ts-1)){beep(seconds);}  //beep mulai adzan
    if((seconds<10)&&(minutes==0)){beep(seconds);}                //beep akan qamah
    timerElement.textContent=fmt2(minutes)+':'+fmt2(seconds);
  }
  timerInterval=setInterval(startTimer,1000);
  modal.style.display='block';
}

function drawClock(){
  drawFace(ctx,radius);
  drawNumbers(ctx,radius);
  drawTime(ctx,radius);
}

function drawFace(ctx,radius){
  const grad=ctx.createRadialGradient(0,0,radius*0.95,0,0,radius*1.05);
  grad.addColorStop(0,'#333');
  grad.addColorStop(0.5,'white');
  grad.addColorStop(1,'#333');
  ctx.beginPath();
  ctx.arc(0,0,radius,0,2*Math.PI);
  ctx.fillStyle='white';
  ctx.fill();
  ctx.strokeStyle=grad;
  ctx.lineWidth=radius*0.1;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0,0,radius*0.1,0,2*Math.PI);
  ctx.fillStyle='#333';
  ctx.fill();
}

function drawNumbers(ctx,radius){
  ctx.font=radius*0.15+'px arial';
  ctx.textBaseline='middle';
  ctx.textAlign='center';
  for(let num=1;num<13;num++){
    let ang=num*Math.PI/6;
    ctx.rotate(ang);
    ctx.translate(0,-radius*0.85);
    ctx.rotate(-ang);
    ctx.fillText(num.toString(),0,0);
    ctx.rotate(ang);
    ctx.translate(0,radius*0.85);
    ctx.rotate(-ang);
  }
}

function drawTime(ctx,radius){
  const now=new Date();
  hour=now.getHours();
  minute=now.getMinutes();
  second=now.getSeconds();

  //sisipan supaya tampil digital
  if(second==0){tick();}

  //mengubah image
  if(second==0)
  {
    iimage++;
    if(iimage==nimage)iimage=0;
    document.getElementById('foto').src=image[iimage];
  }
  document.getElementById('clock').innerHTML=fmt2(hour)+':'+fmt2(minute)+':'+fmt2(second);

  //sisipan untuk check waktu shalat
  if(second==0)
  {
    ts=waktushalat(fmt2(hour)+':'+fmt2(minute));
    if(ts==100)   //jumatan
    {
      document.getElementById('modaltext').textContent='ADZAN JUMAT';
      timer(10/60);
    }
    else if(ts>1)
    {
      document.getElementById('modaltext').textContent='IQAMAH';
      timer(ts); //waktu adzan sd iqamah
    }
  }

  //hour
  hour=hour%12;
  hour=(hour*Math.PI/6)+(minute*Math.PI/(6*60))+(second*Math.PI/(360*60));
  drawHand(ctx,hour,radius*0.5,radius*0.07);
  //minute
  minute=(minute*Math.PI/30)+(second*Math.PI/(30*60));
  drawHand(ctx,minute,radius*0.8,radius*0.07);
  // second
  second=(second*Math.PI/30);
  drawHand(ctx,second,radius*0.9,radius*0.02);
}

function drawHand(ctx,pos,length,width){
  ctx.beginPath();
  ctx.lineWidth=width;
  ctx.lineCap='round';
  ctx.moveTo(0,0);
  ctx.rotate(pos);
  ctx.lineTo(0,-length);
  ctx.stroke();
  ctx.rotate(-pos);
}
</script>
